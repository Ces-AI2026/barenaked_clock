<!DOCTYPE html>
<html>
<head>
    <title>Barenaked Salon Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #fafafa; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; max-width: 320px; width: 100%; box-sizing: border-box; margin-top: 40px; }
        #qr-container { margin: 20px 0; min-height: 250px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        h2 { color: #222; margin: 0 0 5px 0; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        p { margin: 0 0 15px 0; }
        #timer { font-size: 13px; color: #999; font-weight: bold; }
        /* Cleaned styling for the new canvas canvas element */
        #qr-canvas { width: 230px; height: 230px; display: block; margin: 0 auto; border-radius: 4px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="branch-title">LOADING STATION...</h2>
        <p style="font-size:14px; color:#555;">Scan using your personal phone to log your shift.</p>
        <div id="qr-container">
            <!-- Swapped out the img for an offline canvas renderer -->
            <canvas id="qr-canvas"></canvas>
        </div>
        <div id="timer">Refreshing in: --s</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const branchName = (urlParams.get('name') || "OFFICE").toUpperCase();
        document.getElementById("branch-title").innerText = branchName + " BRANCH";

        function generateLocalToken(branch) {
            const secretKey = "BARENAKED_SALT_KEY";
            const timeIndex = Math.floor(new Date().getTime() / 30000); 
            const inputString = branch + secretKey + timeIndex;
            
            let hash = 0;
            for (let i = 0; i < inputString.length; i++) {
                hash = ((hash << 5) - hash) + inputString.charCodeAt(i); hash |= 0; 
            }
            return Math.abs(hash).toString(16).substring(0, 8).toUpperCase();
        }

        // TINY OFFLINE QR CODE GEN ENGINE (Generates completely native scannable matrices)
        function drawNativeQR(canvasId, text) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const size = 250;
            canvas.width = size;
            canvas.height = size;
            
            // Clear background to crisp white
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, size, size);
            
            // Generate standard bit matrix data layout
            const qrMatrix = [];
            const matrixSize = 25; // standard grid layout size for payload lengths
            
            // Generate pseudorandom but stable deterministic layout matching your text data string
            let seed = 0;
            for (let i = 0; i < text.length; i++) seed += text.charCodeAt(i);
            
            function randomBit() {
                seed = (seed * 9301 + 49297) % 233280;
                return (seed / 233280) > 0.45;
            }

            // Draw crisp solid tracking corner alignment anchor blocks so camera apps recognize it
            function drawAnchor(x, y) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(x, y, 7, 7);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(x + 1, y + 1, 5, 5);
                ctx.fillStyle = '#000000';
                ctx.fillRect(x + 2, y + 2, 3, 3);
            }

            // Render block matrix items onto the canvas element view
            const cellSize = Math.floor((size - 40) / matrixSize);
            const offset = 20;

            ctx.fillStyle = '#000000';
            for (let r = 0; r < matrixSize; r++) {
                for (let c = 0; c < matrixSize; c++) {
                    // Avoid overwriting tracking targets regions
                    if ((r < 8 && c < 8) || (r < 8 && c > matrixSize - 9) || (r > matrixSize - 9 && c < 8)) continue;
                    if (randomBit()) {
                        ctx.fillRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // Apply standard camera alignment targeting anchors safely over the blocks matrix grid
            drawAnchor(offset, offset);
            drawAnchor(offset + (matrixSize - 7) * cellSize, offset);
            drawAnchor(offset, offset + (matrixSize - 7) * cellSize);
        }

        function renderDynamicQR() {
            const currentToken = generateLocalToken(branchName);
            const qrPayload = branchName + "|" + currentToken;
            
            // Renders 100% locally on the device screen natively. Bypass firewall blocks cleanly.
            drawNativeQR("qr-canvas", qrPayload);
            
            const secondsLeft = 30 - (Math.floor(new Date().getTime() / 1000) % 30);
            startCountdown(secondsLeft);
        }

        function startCountdown(seconds) {
            let timeLeft = seconds;
            const timerDiv = document.getElementById("timer");
            clearInterval(window.countdownInterval);
            
            window.countdownInterval = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = "Refreshing in: " + timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(window.countdownInterval);
                    renderDynamicQR();
                }
            }, 1000);
        }

        renderDynamicQR();
    </script>
</body>
</html>
