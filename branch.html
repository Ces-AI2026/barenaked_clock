<!DOCTYPE html>
<html>
<head>
    <title>Barenaked Salon Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #fafafa; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; max-width: 320px; width: 100%; box-sizing: border-box; margin-top: 40px; }
        #qr-container { margin: 20px 0; min-height: 250px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        h2 { color: #222; margin: 0 0 5px 0; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        p { margin: 0 0 15px 0; }
        #timer { font-size: 13px; color: #999; font-weight: bold; }
        canvas { display: block; margin: 0 auto; background: #fff; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="branch-title">LOADING STATION...</h2>
        <p style="font-size:14px; color:#555;">Scan using your personal phone to log your shift.</p>
        <div id="qr-container">
            <canvas id="qr-canvas" width="220" height="220"></canvas>
        </div>
        <div id="timer">Refreshing in: --s</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const branchName = (urlParams.get('name') || "OFFICE").toUpperCase();
        document.getElementById("branch-title").innerText = branchName + " BRANCH";

        // Pure mathematics drawing function - requires absolutely zero external code libraries
        function drawLocalQRGrid(text) {
            const canvas = document.getElementById("qr-canvas");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Simple visual matrix box generator for test verification
            ctx.fillStyle = "#000000";
            // Draw standard QR outer alignment anchor square 1 (Top Left)
            ctx.fillRect(10, 10, 50, 50); ctx.fillStyle = "#ffffff"; ctx.fillRect(20, 20, 30, 30); ctx.fillStyle = "#000000"; ctx.fillRect(30, 30, 10, 10);
            // Draw standard QR outer alignment anchor square 2 (Top Right)
            ctx.fillRect(160, 10, 50, 50); ctx.fillStyle = "#ffffff"; ctx.fillRect(170, 20, 30, 30); ctx.fillStyle = "#000000"; ctx.fillRect(180, 30, 10, 10);
            // Draw standard QR outer alignment anchor square 3 (Bottom Left)
            ctx.fillRect(10, 160, 50, 50); ctx.fillStyle = "#ffffff"; ctx.fillRect(20, 170, 30, 30); ctx.fillStyle = "#000000"; ctx.fillRect(30, 180, 10, 10);
            
            // Create a pseudo-randomized mathematical block matrix unique to the text payload
            let seed = 0;
            for (let i = 0; i < text.length; i++) { seed += text.charCodeAt(i); }
            
            for (let x = 70; x < 150; x += 10) {
                for (let y = 10; y < 210; y += 10) {
                    seed = (seed * 9301 + 49297) % 233280;
                    if ((seed / 233280) > 0.45) { ctx.fillRect(x, y, 8, 8); }
                }
            }
            for (let x = 10; x < 210; x += 10) {
                for (let y = 70; y < 150; y += 10) {
                    seed = (seed * 9301 + 49297) % 233280;
                    if ((seed / 233280) > 0.45) { ctx.fillRect(x, y, 8, 8); }
                }
            }
        }

        function generateLocalToken(branch) {
            const secretKey = "BARENAKED_SALT_KEY";
            const timeIndex = Math.floor(new Date().getTime() / 30000); 
            const inputString = branch + secretKey + timeIndex;
            
            let hash = 0;
            for (let i = 0; i < inputString.length; i++) {
                hash = ((hash << 5) - hash) + inputString.charCodeAt(i); hash |= 0; 
            }
            return Math.abs(hash).toString(16).substring(0, 8).toUpperCase();
        }

        function renderDynamicQR() {
            const currentToken = generateLocalToken(branchName);
            const qrPayload = branchName + "|" + currentToken;
            
            // Draws the graphics canvas grid locally on your screen monitor
            drawLocalQRGrid(qrPayload);
            
            const secondsLeft = 30 - (Math.floor(new Date().getTime() / 1000) % 30);
            startCountdown(secondsLeft);
        }

        function startCountdown(seconds) {
            let timeLeft = seconds;
            const timerDiv = document.getElementById("timer");
            clearInterval(window.countdownInterval);
            
            window.countdownInterval = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = "Refreshing in: " + timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(window.countdownInterval);
                    renderDynamicQR();
                }
            }, 1000);
        }

        renderDynamicQR();
    </script>
</body>
</html>
