<!DOCTYPE html>
<html>
<head>
    <title>Barenaked Salon Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, Arial, sans-serif; text-align: center; background: #f5f5f7; color: #1d1d1f; padding: 20px; margin: 0; }
        .card { background: white; padding: 24px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: inline-block; max-width: 340px; width: 100%; box-sizing: border-box; margin-top: 15px; }
        h2 { font-size: 20px; margin: 0 0 4px 0; color: #000; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        p { font-size: 13px; color: #86868b; margin: 0 0 20px 0; line-height: 1.4; }
        .interactive-container { position: relative; width: 100%; min-height: 240px; background: #e8e8ed; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
/* ====================================================================================================
   FIXED VIDEO LAYER STYLING
   Keeps the live selfie camera view framed, responsive, and visible on the phone screen.
   ==================================================================================================== */
video { 
    width: 100%; 
    height: 240px; 
    object-fit: cover; 
    background: #000; 
    border-radius: 12px; 
}

/* ====================================================================================================
   FIXED CANVAS LAYER STYLING
   CRITICAL FIX: Removed 'display: none' so smartphone graphics processors do not freeze the frame.
   This keeps the canvas completely active in memory but physically moves it off-screen out of sight.
   ==================================================================================================== */
canvas {
    position: absolute;
    left: -9999px;
    top: -9999px;
    opacity: 0;
    pointer-events: none;
}
        .btn { background: #0071e3; color: white; border: none; padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 8px; width: 100%; cursor: pointer; transition: background 0.2s; margin-top: 15px; box-sizing: border-box; }
        .btn:hover { background: #0077ed; }
        .btn:disabled { background: #d2d2d7; color: #86868b; cursor: not-allowed; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; box-sizing: border-box; text-align: center; outline: none; }
        .alert-box { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 500; display: none; margin-top: 12px; line-height: 1.4; text-align: center; }
        .error { background: #ffe7e6; color: #b60000; border: 1px solid #ffc9c7; }
        .success { background: #e3f9e5; color: #1da124; border: 1px solid #c1f2c4; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0071e3; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-trigger { font-size: 11px; color: #d2d2d7; margin-top: 25px; cursor: pointer; text-decoration: underline; user-select: none; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="branch-display-title">SALON STATION</h2>
        <p id="system-status-msg">Verifying browser terminal security profile elements...</p>
        
        <div class="interactive-container">
            <div id="ui-loader-spinner" class="loading-spinner" style="display: block;"></div>
            <video id="phone-video-stream" autoplay playsinline muted></video>
 <!-- ====================================================================================================
     FIXED CANVAS MARKUP WITH NATIVE BOUNDS
     CRITICAL FIX: Adding hardcoded width and height attributes directly into the HTML tag ensures the 
     mobile GPU creates a valid pixel grid area. This stops the snapshot from turning up completely blank.
     ==================================================================================================== -->
            <canvas id="photo-capture-canvas" width="340" height="240"></canvas>

            
            <!-- Secure Initial Login Form -->
            <div id="registration-form-panel" style="display: none; padding: 20px; width: 100%;">
                <input type="text" id="employee-id-input" class="input-field" placeholder="Enter Employee ID" autocomplete="off">
                <button type="button" class="btn" onclick="executeDevicePairingSequence()">Link Phone to Account</button>
            </div>

            <!-- Traceable Manager Override Panel -->
            <div id="manager-override-panel" style="display: none; padding: 20px; width: 100%;">
                <span style="font-size:12px; font-weight:bold; color:#1d1d1f; display:block; margin-bottom:10px;">MANAGER SECURITY OVERRIDE</span>
                <input type="password" id="manager-pin-input" class="input-field" placeholder="Enter 4-Digit PIN Key" maxlength="4">
                <button type="button" class="btn" style="background:#000;" onclick="submitManagerResetKey()">Authorize Hardware Swap</button>
                <button type="button" class="btn" style="background:transparent; color:#0071e3; margin-top:5px; padding:4px;" onclick="restoreErrorDisplayWindow()">Cancel</button>
            </div>
        </div>

        <button type="button" id="master-action-btn" class="btn" disabled onclick="executeSelfieAttendancePunch()">Capture Verification Punch</button>
        <div id="system-response-alert" class="alert-box"></div>
        <span class="hidden-trigger" onclick="displayManagerOverrideForm()">Device Hardware Reset</span>
    </div>
    <script>
        // ⚠️ REPLACE THIS STRING LINK WITH YOUR ACTUAL LIVE GOOGLE SCRIPT EXECUTION LINK ⚠️
        const GOOGLE_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbwqdyBG-U6cAXYeVJwDKtZ7IaI9XDxmro6WnDrE-BtzNq1zYJvUN7EHSHvP7Gp9Lg3RdQ/exec";

        // ====================================================================================================
        // IMGBB API KEY STORAGE
        // ⚠️ REPLACE THE LETTERS BELOW WITH YOUR ACTUAL CHOSEN IMGBB PRIVATE API KEY ⚠️
        // ====================================================================================================
        const IMGBB_API_KEY = "6038206c42b816d3fcfcfd5ca68862f7";


        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_BRANCH = (urlParams.get('location') || urlParams.get('name') || "OFFICE").toUpperCase();
        document.getElementById("branch-display-title").innerText = CURRENT_BRANCH + " STATION";

        let LOCAL_HARDWARE_TOKEN = localStorage.getItem("BN_SECURE_DEVICE_TOKEN");
        let AUTHORIZED_MGR_NAME = "";

        window.addEventListener("DOMContentLoaded", () => {
            if (!LOCAL_HARDWARE_TOKEN) {
                document.getElementById("ui-loader-spinner").style.display = "none";
                document.getElementById("system-status-msg").innerText = "First-time setup: Lock device registration signature.";
                document.getElementById("registration-form-panel").style.display = "block";
            } else {
                initializeCameraHardware();
            }
        });

        function initializeCameraHardware() {
            document.getElementById("registration-form-panel").style.display = "none";
            document.getElementById("manager-override-panel").style.display = "none";
            document.getElementById("ui-loader-spinner").style.display = "block";
            document.getElementById("system-status-msg").innerText = "Position face within camera view target frame.";
            
            const video = document.getElementById("phone-video-stream");
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(stream => {
                    window.localStreamReference = stream;
                    video.srcObject = stream;
                    video.style.display = "block";
                    document.getElementById("ui-loader-spinner").style.display = "none";
                    document.getElementById("master-action-btn").disabled = false;
                })
                .catch(err => {
                    displaySystemResponse("Hardware Error: Front camera stream access blocked or missing.", true);
                    document.getElementById("ui-loader-spinner").style.display = "none";
                });
        }

        function executeDevicePairingSequence() {
            const empIdInput = document.getElementById("employee-id-input").value.trim();
            if (!empIdInput) return alert("Employee ID is required to bind account matrix.");
            
            toggleUiProcessingState(true);
            const generatedTokenString = "BN_TOK_" + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15).toUpperCase();
            
            // Connect to Google Cloud backend over the secure POST data envelope channel
            executeCloudRPC("registerDeviceToken", [empIdInput, generatedTokenString], (res) => {
                toggleUiProcessingState(false);
                if (res.status === "success") {
                    localStorage.setItem("BN_SECURE_DEVICE_TOKEN", generatedTokenString);
                    LOCAL_HARDWARE_TOKEN = generatedTokenString;
                    displaySystemResponse("Phone Paired to Profile: " + res.employeeName, false);
                    setTimeout(() => { initializeCameraHardware(); }, 2000);
                } else {
                    displaySystemResponse(res.message, true);
                }
            });
        }

        // === START OF FUNCTION: executeSelfieAttendancePunch ===

        function executeSelfieAttendancePunch() {
            toggleUiProcessingState(true);
            document.getElementById("system-status-msg").innerText = "Capturing facial verification asset...";

            const video = document.getElementById("phone-video-stream");
            const canvas = document.getElementById("photo-capture-canvas");
            const context = canvas.getContext("2d");

            // Match canvas dimensions to the active video streaming frame
            //canvas.width = video.videoWidth;
            //canvas.height = video.videoHeight;

           // === START OF REPLACEMENT: HARDCODED BOUNDARY CANVAS RECTANGLE ===
           // Enforces fixed pixel bounds to prevent mobile sandboxes from reading 0 width dimensions
             canvas.width = 340;
             canvas.height = 240;
           // === END OF REPLACEMENT: HARDCODED BOUNDARY CANVAS RECTANGLE ===


            // Draw the current camera frame instantly onto the canvas layout
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Freeze the screen preview by switching visibility states
            video.style.display = "none";
            canvas.style.display = "block";

             // === INITIALIZATION OF THE IMGBB API KEY ===
            const IMGBB_API_KEY = "6038206c42b816d3fcfcfd5ca68862f7";

            // STEP 1: Convert canvas frame to a native binary JPEG Blob with 70% compression (slams size below 100KB)
            canvas.toBlob(function(imageBlob) {
                if (!imageBlob) {
                    displaySystemResponse("Hardware Error: Failed to compress visual capture file asset.", true);
                    toggleUiProcessingState(false);
                    restoreVideoDisplayFeed();
                    return;
                }

                // STEP 2: Wrap the compressed binary image file into a standard multipart form data packet
                const imageFormPacket = new FormData();
                imageFormPacket.append("image", imageBlob, "verification_selfie.jpg");

                document.getElementById("system-status-msg").innerText = "Uploading visual alibi to secure hosting matrix...";

                // ///////////////////////////////////////////////////////////////////////////
                // ⚠️ CONFIRMATION: THIS IS THE HIDDEN MACHINE PATHWAY FOR IMGBB API UPLOADS ⚠️
                // ///////////////////////////////////////////////////////////////////////////
                fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_API_KEY, {
                    method: "POST",
                    body: imageFormPacket
                })
                .then(response => response.json())
                .then(imgbbResponse => {
                    if (imgbbResponse.success) {
                        // Captures the official webpage viewer link to completely bypass hotlink restrictions
                        const hostedPhotoUrl = imgbbResponse.data.url_viewer;
                        
                        document.getElementById("system-status-msg").innerText = "Syncing final attendance ledger records...";
                        
                        // Pass the clean image web link over to your running Google Sheet database rows
                        executeCloudRPC("processAttendancePunch", [LOCAL_HARDWARE_TOKEN, hostedPhotoUrl, CURRENT_BRANCH, AUTHORIZED_MGR_NAME], (res) => {
                            toggleUiProcessingState(false);
                            if (res.status === "success") {
                                displaySystemResponse(res.message + " - " + res.timeString + " for " + res.employeeName, false);
                                document.getElementById("system-status-msg").innerText = "Verification complete. Terminal reset loaded.";
                                if (window.localStreamReference) window.localStreamReference.getTracks().forEach(track => track.stop());
                                setTimeout(() => { window.location.reload(); }, 3500);
                            } else {
                                displaySystemResponse(res.message, true);
                                restoreVideoDisplayFeed();
                            }
                        });
                    } else {
                        throw new Error(imgbbResponse.error ? imgbbResponse.error.message : "ImgBB Ingestion Fault");
                    }
                })
                .catch(err => {
                    console.error("Hosting Fault: ", err);
                    displaySystemResponse("Storage Write Error: Photo channel timeout. Try again.", true);
                    toggleUiProcessingState(false);
                    restoreVideoDisplayFeed();
                });
            // Removes the quality downscale multiplier to bypass smartphone graphics chip glitching
            }, "image/jpeg"); 
        }

        // === END OF FUNCTION: executeSelfieAttendancePunch ===


        function displayManagerOverrideForm() {
            if (window.localStreamReference) window.localStreamReference.getTracks().forEach(track => track.stop());
            document.getElementById("phone-video-stream").style.display = "none";
            document.getElementById("photo-capture-canvas").style.display = "none";
            document.getElementById("registration-form-panel").style.display = "none";
            document.getElementById("system-status-msg").innerText = "Awaiting store management unlock authorization.";
            document.getElementById("manager-override-panel").style.display = "block";
            document.getElementById("master-action-btn").disabled = true;
        }

        function submitManagerResetKey() {
            const pinVal = document.getElementById("manager-pin-input").value.trim();
            const targetEmpId = prompt("Enter the Employee ID whose device registration signature must be cleared:");
            if (!targetEmpId) return;
            
            document.getElementById("ui-loader-spinner").style.display = "block";
            
            executeCloudRPC("verifyManagerOverride", [pinVal, targetEmpId], (res) => {
                document.getElementById("ui-loader-spinner").style.display = "none";
                if (res.status === "success") {
                    localStorage.removeItem("BN_SECURE_DEVICE_TOKEN");
                    LOCAL_HARDWARE_TOKEN = null;
                    AUTHORIZED_MGR_NAME = res.managerName;
                    alert(res.message + "\n\nThe profile is unbound. Scan with the new phone device to pair.");
                    window.location.reload();
                } else {
                    alert(res.message);
                }
            });
        }

        // UNBLOCKABLE POST PAYLOAD BRIDGE: Packages large photo strings inside the HTTP message body
        function executeCloudRPC(actionMethod, argumentArray, successCallback) {
            const payloadData = {
                action: actionMethod,
                args: argumentArray
            };

            fetch(GOOGLE_SCRIPT_API_URL, {
                method: "POST",
                mode: "cors",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payloadData)
            })
            .then(response => response.json())
            .then(data => {
                successCallback(data);
            })
            .catch(err => {
                console.error("Network Communication Fault: ", err);
                displaySystemResponse("Transmission Error: Connection timed out. Try again.", true);
                toggleUiProcessingState(false);
                restoreVideoDisplayFeed();
            });
        }

        function restoreVideoDisplayFeed() {
            document.getElementById("photo-capture-canvas").style.display = "none";
            document.getElementById("phone-video-stream").style.display = "block";
        }

        function restoreErrorDisplayWindow() { window.location.reload(); }
        function toggleUiProcessingState(isProcessing) {
            document.getElementById("master-action-btn").disabled = isProcessing;
            document.getElementById("ui-loader-spinner").style.display = isProcessing ? "block" : "none";
        }
        function displaySystemResponse(msg, isError) {
            const box = document.getElementById("system-response-alert");
            box.innerText = msg;
            box.className = "alert-box " + (isError ? "error" : "success");
            box.style.display = "block";
        }
    </script>
</body>
</html>
