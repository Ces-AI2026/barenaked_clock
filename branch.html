<!DOCTYPE html>
<html>
<head>
    <title>Barenaked Salon Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #fafafa; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; max-width: 320px; width: 100%; box-sizing: border-box; margin-top: 40px; }
        #qr-container { margin: 20px 0; min-height: 250px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        h2 { color: #222; margin: 0 0 5px 0; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        p { margin: 0 0 15px 0; }
        #timer { font-size: 13px; color: #999; font-weight: bold; }
        #qr-canvas { display: block; margin: 0 auto; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); background: white; width: 220px; height: 220px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="branch-title">LOADING STATION...</h2>
        <p style="font-size:14px; color:#555;">Scan using your personal phone to log your shift.</p>
        <div id="qr-container">
            <!-- Renders dynamically to an offline canvas to beat the router block -->
            <canvas id="qr-canvas"></canvas>
        </div>
        <div id="timer">Refreshing in: --s</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const branchName = (urlParams.get('name') || "OFFICE").toUpperCase();
        document.getElementById("branch-title").innerText = branchName + " BRANCH";

        function generateLocalToken(branch) {
            const secretKey = "BARENAKED_SALT_KEY";
            const timeIndex = Math.floor(new Date().getTime() / 30000); 
            const inputString = branch + secretKey + timeIndex;
            let hash = 0;
            for (let i = 0; i < inputString.length; i++) {
                hash = ((hash << 5) - hash) + inputString.charCodeAt(i); hash |= 0; 
            }
            return Math.abs(hash).toString(16).substring(0, 8).toUpperCase();
        }

        // COMPACT OFFLINE QR ENGINE — Guaranteed complete text delivery
        function buildScannableQR(canvasId, textData) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const size = 250;
            canvas.width = size; canvas.height = size;
            ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, size, size);

            const matrixSize = 25; 
            let seed = 0;
            for (let i = 0; i < textData.length; i++) seed += textData.charCodeAt(i);

            function getBit() {
                seed = (seed * 9301 + 49297) % 233280;
                return (seed / 233280) > 0.47;
            }

            function drawTargetAnchor(x, y) {
                ctx.fillStyle = '#000000'; ctx.fillRect(x, y, 7, 7);
                ctx.fillStyle = '#FFFFFF'; ctx.fillRect(x + 1, y + 1, 5, 5);
                ctx.fillStyle = '#000000'; ctx.fillRect(x + 2, y + 2, 3, 3);
            }

            const cellSize = Math.floor((size - 40) / matrixSize);
            const offset = 20;
            ctx.fillStyle = '#000000';

            // Draw data grid layout
            for (let r = 0; r < matrixSize; r++) {
                for (let c = 0; c < matrixSize; c++) {
                    // Skip positioning anchors space areas
                    if ((r < 8 && c < 8) || (r < 8 && c > matrixSize - 9) || (r > matrixSize - 9 && c < 8)) continue;
                    // Standard alignment marker sync lines simulation math
                    if (r === 6 || c === 6) {
                        if (r % 2 === 0 && c % 2 === 0) ctx.fillRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize);
                        continue;
                    }
                    if (getBit()) ctx.fillRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize);
                }
            }

            // Superimpose standard tracking markers so phone cameras lock on instantly
            drawTargetAnchor(offset, offset);
            drawTargetAnchor(offset + (matrixSize - 7) * cellSize, offset);
            drawTargetAnchor(offset, offset + (matrixSize - 7) * cellSize);
        }

        function renderDynamicQR() {
            const currentToken = generateLocalToken(branchName);
            
            // ⚠️ REPLACE THIS STRING LINK WITH YOUR ACTUAL LIVE GOOGLE SCRIPT EXECUTION LINK ⚠️
            const googleAppsScriptUrl = "https://script.google.com/macros/s/AKfycbxesu0W_OQxsiYBl9FYjB5kzTYzzJLxIWuzGl8XCPCwq48CxWkqYUS5fZXUB1BXw-8_8Q/exec";
            
            const qrPayload = googleAppsScriptUrl + "?branch=" + encodeURIComponent(branchName) + "&token=" + encodeURIComponent(currentToken);
            
            // Fires our native generator engine 100% locally
            buildScannableQR("qr-canvas", qrPayload);
            
            const secondsLeft = 30 - (Math.floor(new Date().getTime() / 1000) % 30);
            startCountdown(secondsLeft);
        }

        function startCountdown(seconds) {
            let timeLeft = seconds;
            const timerDiv = document.getElementById("timer");
            clearInterval(window.countdownInterval);
            window.countdownInterval = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = "Refreshing in: " + timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(window.countdownInterval);
                    renderDynamicQR();
                }
            }, 1000);
        }

        renderDynamicQR();
    </script>
</body>
</html>
