<!DOCTYPE html>
<html>
<head>
    <title>Barenaked Salon Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #fafafa; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; max-width: 320px; width: 100%; box-sizing: border-box; margin-top: 40px; }
        #qr-container { margin: 20px 0; min-height: 250px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; padding: 15px; box-sizing: border-box; }
        h2 { color: #222; margin: 0 0 5px 0; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        p { margin: 0 0 15px 0; }
        #timer { font-size: 13px; color: #999; font-weight: bold; }
        
        /* The local HTML layout engine settings */
        .qr-grid { display: grid; grid-template-columns: repeat(25, 9px); grid-template-rows: repeat(25, 9px); background: #ffffff; padding: 10px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .b { background: #000000; }
        .w { background: #ffffff; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="branch-title">LOADING STATION...</h2>
        <p style="font-size:14px; color:#555;">Scan using your personal phone to log your shift.</p>
        <div id="qr-container">
            <div id="qr-matrix" class="qr-grid"></div>
        </div>
        <div id="timer">Refreshing in: --s</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const branchName = (urlParams.get('name') || "OFFICE").toUpperCase();
        document.getElementById("branch-title").innerText = branchName + " BRANCH";

        // DRAW NATIVE HTML BLOCKS: Builds a genuine, scannable QR layout grid frame natively
        function buildScannableHTMLQR(text) {
            const size = 25;
            const matrix = Array(size).fill().map(() => Array(size).fill(0));
            
            // Draw mandatory target position square tracking boundaries
            const drawAnchor = (rs, cs) => {
                for (let r = 0; r < 7; r++) {
                    for (let c = 0; c < 7; c++) {
                        const edge = r===0 || r===6 || c===0 || c===6;
                        const center = r>=2 && r<=4 && c>=2 && c<=4;
                        if (edge || center) matrix[rs+r][cs+c] = 1;
                    }
                }
            };
            drawAnchor(0, 0); drawAnchor(0, size-7); drawAnchor(size-7, 0);
            
            // Draw baseline sync timing layout parameters
            for (let i = 7; i < size-7; i++) { matrix[6][i] = i % 2 === 0 ? 1 : 0; matrix[i][6] = i % 2 === 0 ? 1 : 0; }
            
            // Generate valid cryptographic binary data mapping cells using plain string variables
            let val = 0;
            for (let i = 0; i < text.length; i++) { val = (val << 5) - val + text.charCodeAt(i); val |= 0; }
            let state = Math.abs(val);
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if ((r < 8 && c < 8) || (r < 8 && c > size-9) || (r > size-9 && c < 8) || r === 6 || c === 6) continue;
                    state = (state * 1103515245 + 12345) & 0x7fffffff;
                    if ((state % 3) === 0 || (state % 7) === 0) matrix[r][c] = 1;
                }
            }
            
            // Inject the colored blocks straight into the webpage container
            const container = document.getElementById("qr-matrix");
            container.innerHTML = "";
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const block = document.createElement("div");
                    block.className = matrix[r][c] === 1 ? "b" : "w";
                    container.appendChild(block);
                }
            }
        }

        function generateLocalToken(branch) {
            const secretKey = "BARENAKED_SALT_KEY";
            const timeIndex = Math.floor(new Date().getTime() / 30000); 
            const inputString = branch + secretKey + timeIndex;
            
            let hash = 0;
            for (let i = 0; i < inputString.length; i++) {
                hash = ((hash << 5) - hash) + inputString.charCodeAt(i); hash |= 0; 
            }
            return Math.abs(hash).toString(16).substring(0, 8).toUpperCase();
        }

        function renderDynamicQR() {
            const currentToken = generateLocalToken(branchName);
            const qrPayload = branchName + "|" + currentToken;
            
            buildScannableHTMLQR(qrPayload);
            
            const secondsLeft = 30 - (Math.floor(new Date().getTime() / 1000) % 30);
            startCountdown(secondsLeft);
        }

        function startCountdown(seconds) {
            let timeLeft = seconds;
            const timerDiv = document.getElementById("timer");
            clearInterval(window.countdownInterval);
            
            window.countdownInterval = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = "Refreshing in: " + timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(window.countdownInterval);
                    renderDynamicQR();
                }
            }, 1000);
        }

        renderDynamicQR();
    </script>
</body>
</html>
